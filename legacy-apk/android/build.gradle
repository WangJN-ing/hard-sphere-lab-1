// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        maven { url uri("$rootDir/local-maven") }
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.0'
        classpath 'com.google.gms:google-services:4.4.4'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        maven { url uri("$rootDir/local-maven") }
        google()
        mavenCentral()
    }

    configurations.all {
        resolutionStrategy.force "androidx.core:core-splashscreen:${rootProject.ext.coreSplashScreenVersion}"
        resolutionStrategy.force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:2.2.0"
        resolutionStrategy.force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:2.2.0"
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
